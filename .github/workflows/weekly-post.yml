name: Weekly Post

# 매주 월요일 00:00 UTC (= 09:00 KST) 자동 실행
# 수동 트리거: Actions 탭 → "Run workflow"
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # 한국어 폰트 (OG 이미지 생성용)
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra

      - name: Generate new weekly post + rebuild
        env:
          SITE_DOMAIN: ${{ vars.SITE_DOMAIN || 'https://minsungkwon-bit.github.io' }}
        run: |
          python3 build.py --new-post --domain "$SITE_DOMAIN"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "이번 주 포스트 변경 없음 - 스킵"
            exit 0
          fi
          WEEK_TAG=$(date -u +'%Y-W%V')
          git commit -m "weekly: $WEEK_TAG auto-post

🤖 Auto-generated by weekly-post workflow"
          git push
